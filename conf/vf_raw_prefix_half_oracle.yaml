# --------------------
# Config for 1+1 nodes
# --------------------
defaults:
    - base
    - _self_

model_path: Qwen/Qwen3-4B-Instruct-2507
# Uncomment to skip test set rollouts
eval_every_n_versions: 110

finetune:
  attempts: 8
  train_batch_size: 1
  valid_batch_size: 1
  gradient_accumulation_passes: 16
  learning_rate: 1.0e-6
  max_train_steps: 240
  rl:
    kl_coef: 0.0
    entropy_bonus: 0.0
  seq_length: 16384
  seq_parallel: 1
  save_checkpoint_steps: 30
  push_to_hub: true
  hub_model_id: haoranli-ml/Qwen3-4B-Instruct-2507-raw_prefix_half_oracle
  hub_model_revision: v00.00
  hub_ignore_patterns:
    - "*.pt"
    - "*.pth"

llm:
  parameters:
    max_tokens: 8192 
    temperature: 1.0
# Sampling params taken from Qwen3 tech report: https://arxiv.org/abs/2505.09388
test_llm:
  parameters: 
    max_tokens: 8192
    temperature: 0.8 
    top_p: 0.8
    top_k: 20

actor:
  rollout_policy: pipelinerl.domains.math.generate_math_rollout
  system_prompt: null
  task_template: |-
    {task}

wandb:
  wandb_name: vf_raw_prefix_half_oracle_training_1_3
  wandb_project: pipeline-rl-VF
  wandb_resume: never

environment:
  _target_: pipelinerl.domains.math.MathEnvironment

dataset_loader: pipelinerl.domains.math.load_datasets
train_dataset_names:
  - hub_id: haoranli-ml/value_func_data_v1_with_Q_labels_and_sum_prefix-half_oracle_train-PRL
    split: train
    use_sum_prefix: false
test_dataset_names:
  - hub_id: haoranli-ml/value_func_data_v1_with_Q_labels_and_sum_prefix-half_oracle_train-PRL
    split: test_no_oracle
    use_sum_prefix: false
  - hub_id: haoranli-ml/value_func_data_v1_with_Q_labels_and_sum_prefix-half_oracle_train-PRL
    split: test_all_oracle
    use_sum_prefix: false
  - hub_id: haoranli-ml/value_func_data_v1_with_Q_labels_and_sum_prefix-half_oracle_train-PRL
    split: test_half_oracle
    use_sum_prefix: false

vllm_config:
  use_v1: false
  vllm_kwargs:
    dtype: bfloat16
    gpu-memory-utilization: 0.9
    num-scheduler-steps: 1
    disable-log-requests: ""
    disable-frontend-multiprocessing: ""
    max-num-seqs: ${actor.llm_max_rollouts}
    max-num-batched-tokens: 65536
    enable-chunked-prefill: ""
    return-tokens-as-token-ids: ""
    tensor-parallel-size: 1
    pipeline-parallel-size: 1
    generation-config: vllm

world:
  replicas: 1
  actor_fraction: 4
  preprocessor_fraction: 0
  finetune_fraction: 4
  env_replicas: 1
  actor_group_port: 9000
  environment_start_port: 7777

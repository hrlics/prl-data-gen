defaults:
    - base
    - _self_

model_path: Qwen/Qwen3-4B-Thinking-2507
eval_every_n_versions: 2000

# samples_per_step = gradient_accumulation_passes × train_batch_size = 16x16 = 256
# question_per_update = samples_per_step / attempts = 256/8 = 32
finetune:
  attempts: 8
  train_batch_size: 16
  valid_batch_size: 16
  gradient_accumulation_passes: 16
  seq_length: 43000
  seq_parallel: 2
  save_checkpoint_steps: 10
  max_train_steps: 30
  push_to_hub: true
  hub_model_id: haoranli-ml/genvf-v10-data-generator
  hub_model_revision: v00.00
  hub_ignore_patterns:
    - "*.pt"
    - "*.pth"

llm:
  parameters:
    max_tokens: 16384
    temperature: 0.7
    top_p: 0.8
    top_k: 20
  reasoning_delimiters: ["</think>"]
  wandb_table:
    enabled: true
    keep_last_k_groups: 10
    log_every_n_groups: 20

test_llm:
  parameters:
    max_tokens: 16384
    temperature: 0.7
    top_p: 0.8
    top_k: 20

llm_grader:
  name: openai/gpt-oss-20b
  vllm_kwargs:
    num_nodes: 1
    data-parallel-size: 8
    tensor-parallel-size: 1
    max-num-batched-tokens: 16384
    max-num-seqs: 16
    max-model-len: 65536
    gpu-memory-utilization: 0.85
  # Default sampling for judge calls A / B / C2 (no big continuations)
  sampling_kwargs:
    temperature: 1.0
    max_output_tokens: 32768
    reasoning:
      effort: medium
  # C1 (gpt-oss continuing the IMO proof from prefix+z) needs lots of tokens.
  complete_sampling_kwargs:
    temperature: 1.0
    max_output_tokens: 40000
    reasoning:
      effort: medium
  # Placeholder: MathProofEnvironment is still launched by base.yaml jobs schema
  # but the new rollout never hits its /verify_answer endpoint. prompt_name must
  # name a real file so MathProofEnvironment.__init__ doesn't blow up.
  prompt_name: predict_z_v1
  reasoning_delimiters: ["</think>"]
  wandb_table:
    enabled: true
    keep_last_k_groups: 10
    log_every_n_groups: 20
 
# Per-call prompt names consumed by generate_data_generator_rollout
data_generator:
  predict_z_prompt: predict_z_v1
  align_judge_prompt: align_z_judge_v1
  complete_z_prompt: complete_with_z_v1
  perform_judge_prompt: perform_proofbench_no_gt_v1

wandb:
  wandb_dir: /project/flame/aviralku/wandb_logs/
  wandb_entity_name: GenVF
  wandb_project_name: GenVF_train
  wandb_resume: always

actor:
  llm_max_rollouts: 32
  system_prompt: null
  rollout_policy: pipelinerl.domains.math.generate_data_generator_rollout
  task_template: |-
    {task}

environment:
  _target_: pipelinerl.domains.math.MathProofEnvironment
  model_name: ${llm_grader.name}
  sampling_kwargs: ${llm_grader.sampling_kwargs}
  prompt_name: ${llm_grader.prompt_name}

dataset_loader: pipelinerl.domains.math.load_datasets
dataset_loader_params:
  model_path: ${model_path}

train_dataset_names:
  - hub_id: haoranli-ml/genvf-data-generator-100prefix-v1
    split: train
    data_generator: true
    task_prompt: data_generator_task_v1 
test_dataset_names:
  - hub_id: haoranli-ml/genvf-data-generator-100prefix-v1
    split: test
    data_generator: true
    task_prompt: data_generator_task_v1

vllm_config:
  use_v1: false
  vllm_kwargs:
    dtype: bfloat16
    gpu-memory-utilization: 0.9
    num-scheduler-steps: 1
    disable-log-requests: ""
    disable-frontend-multiprocessing: ""
    max-num-seqs: ${actor.llm_max_rollouts}
    max-num-batched-tokens: 16384
    enable-chunked-prefill: ""
    no-enable-prefix-caching: ""
    return-tokens-as-token-ids: ""
    tensor-parallel-size: 1
    pipeline-parallel-size: 1
    generation-config: vllm

world:
  replicas: 1
  actor_fraction: 4
  preprocessor_fraction: 0
  finetune_fraction: 4
  env_replicas: 1
  actor_group_port: 9000
  environment_start_port: 7777
